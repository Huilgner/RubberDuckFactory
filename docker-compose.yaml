services:
  board:
    build:
      context: ./board
    ports:
      - "3001:3000"
    volumes:
      - ./agents:/agents
      - ./project_ledger:/project_ledger
      - ./.governance:/.governance
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  mcp-server:
    build:
      context: .
    ports:
      - "8001:8001"
    volumes:
      - ./agents:/app/agents
      - ./project_ledger:/app/project_ledger
      - ./.governance:/app/.governance
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCP_TRANSPORT=http
      - MCP_PORT=8001
    depends_on:
      - qdrant

  # This would be your High-Tier Orchestrator/Proxy
  orchestrator:
    build:
      context: ./orchestrator # We will create this
    volumes:
      - ./agents:/agents
      - ./project_ledger:/project_ledger
      - ./.governance:/.governance
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
