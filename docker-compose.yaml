services:
  board:
    build:
      context: ./board
    ports:
      - "3001:3000"
    volumes:
      - ./agents:/agents
      - ./project_ledger:/project_ledger
      - ./.governance:/.governance
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  # This would be your High-Tier Orchestrator/Proxy
  orchestrator:
    build:
      context: ./orchestrator # We will create this
    volumes:
      - ./agents:/agents
      - ./project_ledger:/project_ledger
      - ./.governance:/.governance
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
